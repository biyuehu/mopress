name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest] # , windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: install-ubuntu
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH
      - name: install-windows
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser; irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "C:\Users\runneradmin\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: post install
        run: |
          moon version --all
          moon update

      - name: Setup Just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run checks and tests
        run: |
          just prebuild
          moon check
          moon test
          moon fmt && git diff --exit-code
          moon info && git diff --exit-code

      - name: Build project
        run: moon build --release

      - name: Build docs
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          ls _build
          ls _build/native
          ls _build/native/release
          ls _build/native/release/build/main
          cd docs
          ../_build/native/release/build/main/main build

      - name: Deploy to GitHub Pages
        if: ${{ matrix.os == 'ubuntu-latest' }}
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: webpage
          build_dir: docs/dest
          fqdn: https://mo.himeno-sena.com
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}