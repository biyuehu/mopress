name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Moonbit
        uses: hustcer/setup-moonbit@v1

      - name: Update Moonbit registry
        run: moon update

      - name: Run tests
        run: moon test

      - name: Build project
        run: just build
